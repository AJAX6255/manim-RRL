<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>manim-RRL Video Player</title>
    <!-- Modern Typography: Outfit & Roboto Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Starfield overlay -->
    <div class="stars"></div>
    <div class="twinkling"></div>

    <div class="app-container">
        <!-- Main Dashboard -->
        <main class="dashboard-grid">
            <!-- Right Panel: Animation -->
            <section class="display-container">
                <!-- Video Player -->
                <video id="star-video" src="/media/videos/animator/480p15/RRStarPulsation.mp4" loop muted playsinline controls style="width: 100%; max-width: 960px; height: auto; display: block; margin: 0 auto; background: transparent; z-index: 100; position: relative;">
                    Your browser does not support the video tag.
                </video>
                
                <!-- Video Controls Overlay -->
                <div class="video-controls">
                    <button id="btn-play-pause" class="btn-control">⏸ Pause</button>
                    <span class="video-time" id="video-progress">Phase: 0.000</span>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
